name: Deploy app (reusable)

on:
  workflow_call:
    inputs:
      overlay_path:
        description: Path to the kustomize overlay to deploy
        required: true
        type: string
      deployment_name:
        description: Kubernetes deployment name for rollout status check
        required: true
        type: string
      namespace:
        description: Kubernetes namespace
        required: true
        type: string
    secrets:
      GCP_PROJECT_ID:
        required: true
      GKE_CLUSTER_NAME:
        required: true
      GKE_CLUSTER_ZONE:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      ACTIONS_SERVICE_ACCOUNT:
        required: true

env:
  # This forces all actions in the workflow to use Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Apply manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.ACTIONS_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Deploy
        run: |
          kustomize build ${{ inputs.overlay_path }} | kubectl apply -f -

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.deployment_name }} -n ${{ inputs.namespace }} --timeout=120s
