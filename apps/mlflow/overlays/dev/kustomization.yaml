apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Pin a specific image tag for reproducibility
images:
  - name: ghcr.io/mlflow/mlflow
    newTag: "2.11.3"

# Example: scale down replicas in dev to save resources
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: mlflow
